<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.min.js"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/wizard.css">
    <link rel="stylesheet" href="styles/song-image.css">
    <title>歌词海报生成器</title>
</head>

<body class="dark-mode">
    <main>
        <section class="lyrics-image-screen search-form" data-number="1">
            <div class="screen-wrapper">
                <header>
                    <h1>歌词海报生成器</h1>
                </header>
                <div class="platform-selection-container">
                    <label for="platform-select" class="platform-label">音源</label>
                    <select id="platform-select" class="surface">
                        <option value="tencent">QQ 音乐</option>
                        <option value="netease">网易云音乐</option>
                        <option value="kugou">酷狗音乐</option>
                        <option value="baidu">百度音乐</option>
                        <option value="kuwo">酷我音乐</option>
                    </select>
                </div>
                <form>
                    <input class="surface" type="text" id="song-name" placeholder="输入歌曲名和歌手，例如：夜曲 周杰伦">
                    <button class="primary" id="search">
                        搜索！
                    </button>
                </form>
                <div class="searching hidden"></div>
                <div class="error hidden"></div>
            </div>
        </section>
        <section class="lyrics-image-screen hidden search-results" data-number="2">
            <div class="screen-wrapper">
                <header>
                    <button class="go-to-screen material-symbols-outlined" data-number="1">chevron_left</button>
                    <h2>选择歌曲</h2>
                </header>
                <div class="song-selection">
                    <div class="select-song cloneable">
                        <img src="" alt="专辑封面">
                        <div class="name"></div>
                        <div class="authors"></div>
                    </div>
                </div>
            </div>
        </section>
        <section class="lyrics-image-screen hidden lyrics-results" data-number="3">
            <div class="screen-wrapper">
                <header>
                    <button class="go-to-screen material-symbols-outlined" data-number="2">chevron_left</button>
                    <h2>选择歌词</h2>
                    <button class="go-to-screen right material-symbols-outlined" data-number="4">chevron_right</button>
                </header>
                <div class="song-info-display">
                    <img src="" alt="专辑封面" class="song-info-cover">
                    <div class="song-info-text">
                        <div class="song-info-name"></div>
                        <div class="song-info-artist"></div>
                    </div>
                </div>
                <div class="lyrics-toolbar">
                    <button class="toolbar-btn" id="select-all-btn">全选</button>
                    <button class="toolbar-btn" id="deselect-all-btn">取消全选</button>
                </div>
                <div class="searching hidden"></div>
                <div class="lines-selection"></div>
            </div>
            <button class="fab hidden" id="lyrics-fab">
                <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </section>
        <section class="lyrics-image-screen hidden final-options" data-number="4">
            <div class="screen-wrapper">
                <header>
                    <button class="material-symbols-outlined" id="last-go-back">chevron_left</button>
                    <h2>歌词海报</h2>
                    <button class="material-symbols-outlined" id="download">download</button>
                </header>
                <div class="searching hidden"></div>
                <div class="song-image">
                    <div class="header">
                        <img src="" alt="专辑封面">
                        <div>
                            <div class="name" contenteditable></div>
                            <div class="authors" contenteditable></div>
                        </div>
                    </div>
                    <div class="lyrics" contenteditable="true"></div>
                </div>
                <div class="color-selection">
                    <div class="" id="custom-color">
                        <input type="color" id="custom-color-input">
                        <label class="material-symbols-outlined" for="custom-color-input">palette</label>
                    </div>
                </div>
                <div class="switch-container" id="light-text">
                    <div class="switch"></div>
                    <div>浅色文字</div>
                </div>
                <div class="switch-container" id="additional-bg">
                    <div class="switch"></div>
                    <div>背景阴影</div>
                </div>
                <div class="switch-container" id="furigana-toggle">
                    <div class="switch"></div>
                    <div>日语假名注释</div>
                </div>
                <div class="width-control">
                    <div>
                        <label for="width-slider">宽度</label>
                        <span id="width-value">320px</span>
                    </div>
                    <input type="range" id="width-slider" min="200" max="600" value="320" step="10">
                </div>
                <div class="control-group font-selection-container">
                    <div class="font-label">字体地区</div>
                    <select id="font-lang" class="surface">
                        <option value="zh-CN">自动（简中）</option>
                        <option value="zh-TW">繁中（台湾）</option>
                        <option value="zh-HK">繁中（香港）</option>
                        <option value="ja">日语</option>
                        <option value="ko">韩语</option>
                    </select>
                </div>
            </div>
        </section>
    </main>
    <footer class="surface">
        <div>
            基于 <a href="https://github.com/metowolf/Meting" target="_blank">Meting</a>
            构建 | UI 灵感来自
            <a href="https://github.com/palinkiewicz/lyricpost" target="_blank">LyricPost</a>
        </div>
        <div id="dark-mode-toggle">
            <span class="material-symbols-outlined"></span>
        </div>
    </footer>
    <script src="classes/data/Artist.js"></script>
    <script src="classes/data/Lyric.js"></script>
    <script src="classes/data/Song.js"></script>
    <script src="classes/DataFetcher.js"></script>
    <script src="classes/DOMHandler.js"></script>
    <script src="index.js"></script>
</body>

</html>
